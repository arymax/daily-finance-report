<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- Local API key (generated by dashboard.py, gitignored — absent on GitHub Pages) -->
  <script>window.FINNHUB_KEY = '';</script>
  <script src="config.js" onerror="void 0"></script>
  <style>
    /* Tab */
    .tab-btn { border-bottom: 2px solid transparent; transition: color .15s, border-color .15s; }
    .tab-btn.active { border-bottom-color: #3b82f6; color: #93c5fd; }
    .tab-btn:not(.active) { color: #64748b; }
    .tab-btn:not(.active):hover { color: #94a3b8; }

    /* Badges */
    .badge-p1 { background:#1e3a5f; color:#60a5fa; }
    .badge-p2 { background:#3b2e00; color:#fbbf24; }
    .badge-p3 { background:#1e2535; color:#64748b; }
    .badge-pending { background:#0f2137; color:#38bdf8; }
    .badge-partial  { background:#2d1f00; color:#facc15; }
    .badge-ready    { background:#052e16; color:#4ade80; }

    /* P&L */
    .gain { color: #4ade80; }
    .loss { color: #f87171; }
    .neutral { color: #94a3b8; }

    /* Table hover */
    tbody tr:hover td { background: rgba(51,65,85,.35); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Report list item */
    .report-item { cursor:pointer; border-left: 2px solid transparent; transition: all .12s; }
    .report-item:hover { background: rgba(51,65,85,.4); border-left-color: #475569; }
    .report-item.selected { background: rgba(59,130,246,.15); border-left-color: #3b82f6; }

    /* Markdown prose (dark) */
    .prose { color: #cbd5e1; line-height: 1.75; }
    .prose h1,.prose h2,.prose h3,.prose h4 { color:#f1f5f9; font-weight:600; margin-top:1.5em; margin-bottom:.5em; }
    .prose h1 { font-size:1.4em; border-bottom:1px solid #334155; padding-bottom:.4em; }
    .prose h2 { font-size:1.2em; }
    .prose h3 { font-size:1.05em; }
    .prose p  { margin:.75em 0; }
    .prose strong { color:#f1f5f9; }
    .prose em { color:#94a3b8; }
    .prose a  { color:#60a5fa; text-decoration:underline; }
    .prose hr { border-color:#334155; margin:1.5em 0; }
    .prose blockquote { border-left:3px solid #475569; padding-left:1em; color:#94a3b8; margin:1em 0; }
    .prose code { background:#0f172a; color:#86efac; padding:.15em .35em; border-radius:.25em; font-size:.85em; }
    .prose pre  { background:#0f172a; padding:1em; border-radius:.5em; overflow-x:auto; border:1px solid #1e293b; }
    .prose pre code { background:transparent; padding:0; color:#86efac; }
    .prose ul,.prose ol { padding-left:1.5em; margin:.75em 0; }
    .prose li { margin:.3em 0; }
    .prose table { width:100%; border-collapse:collapse; font-size:.9em; margin:1em 0; }
    .prose th { background:#1e293b; color:#94a3b8; font-weight:600; text-align:left; padding:.5em .75em; border:1px solid #334155; font-size:.8em; letter-spacing:.03em; }
    .prose td { padding:.45em .75em; border:1px solid #1e293b; vertical-align:top; }
    .prose tr:nth-child(even) td { background:rgba(30,41,59,.4); }
    .prose tr:hover td { background:rgba(51,65,85,.35); }
  </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen antialiased">

<!-- ══ Top Nav ══════════════════════════════════════════════════════════════ -->
<header class="sticky top-0 z-50 bg-slate-800/95 backdrop-blur border-b border-slate-700">
  <div class="max-w-[1400px] mx-auto px-5 h-14 flex items-center gap-6">
    <span class="font-semibold text-white tracking-tight text-base shrink-0">📊 Finance Dashboard</span>
    <nav class="flex gap-1 h-full">
      <button id="tab-portfolio" onclick="switchTab('portfolio')" class="tab-btn active px-4 text-sm font-medium">持倉總覽</button>
      <button id="tab-watchlist" onclick="switchTab('watchlist')" class="tab-btn px-4 text-sm font-medium">觀察清單</button>
      <button id="tab-market"    onclick="switchTab('market')"    class="tab-btn px-4 text-sm font-medium">市場摘要</button>
      <button id="tab-reports"   onclick="switchTab('reports')"   class="tab-btn px-4 text-sm font-medium">報告記錄</button>
      <button id="tab-themes"    onclick="switchTab('themes')"    class="tab-btn px-4 text-sm font-medium">主題催化劑</button>
      <button id="tab-thesis"    onclick="switchTab('thesis')"    class="tab-btn px-4 text-sm font-medium">產業研究</button>
    </nav>
    <div class="ml-auto flex items-center gap-4 shrink-0">
      <!-- LIVE badge + last-updated -->
      <div class="flex flex-col items-end gap-0.5">
        <span id="live-badge" class="hidden text-xs bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-0.5 rounded-full font-semibold tracking-wide animate-pulse">● LIVE</span>
        <span id="live-last-updated" class="hidden text-xs text-slate-600">更新 —</span>
      </div>
      <!-- Live clock (TST) -->
      <div class="text-right text-xs leading-5">
        <div id="live-clock" class="text-slate-200 font-mono tabular-nums tracking-tight" style="font-size:.8rem;">—</div>
        <div class="text-slate-600">Asia/Taipei</div>
      </div>
      <!-- USD/TWD (live-updated by LivePrices) -->
      <div class="text-right text-xs leading-5 text-slate-400">
        <div id="meta-usd" class="text-slate-500">USD/TWD —</div>
      </div>
    </div>
  </div>
</header>

<!-- ══ Main ═════════════════════════════════════════════════════════════════ -->
<main class="max-w-[1400px] mx-auto px-5 py-6 space-y-6">

  <!-- ─── 持倉總覽 ─────────────────────────────────────────────────────── -->
  <div id="panel-portfolio">
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
      <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <p class="text-xs text-slate-400 mb-1">總資產</p>
        <p class="text-2xl font-bold text-white" id="s-total">—</p>
        <p class="text-xs text-slate-500 mt-0.5">TWD</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <p class="text-xs text-slate-400 mb-1">持倉損益</p>
        <p class="text-2xl font-bold" id="s-pnl">—</p>
        <p class="text-sm mt-0.5" id="s-pnl-pct">—</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <p class="text-xs text-slate-400 mb-1">現金比例</p>
        <p class="text-2xl font-bold text-white" id="s-cash-pct">—</p>
        <p class="text-xs text-slate-500 mt-0.5" id="s-cash-twd">—</p>
      </div>
      <div class="bg-slate-800 rounded-xl p-4 border border-slate-700">
        <p class="text-xs text-slate-400 mb-1">USD/TWD</p>
        <p class="text-2xl font-bold text-white" id="s-usdtwd">—</p>
        <p class="text-xs text-slate-500 mt-0.5">即時匯率</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6 mb-6">
      <div class="lg:col-span-3 bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
        <div class="px-5 py-3 border-b border-slate-700 text-sm font-medium">持倉明細</div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-slate-400 border-b border-slate-700">
                <th class="text-left px-4 py-2 font-medium">標的</th>
                <th class="text-right px-4 py-2 font-medium">現價</th>
                <th class="text-right px-4 py-2 font-medium">市值 TWD</th>
                <th class="text-right px-4 py-2 font-medium">損益 TWD</th>
                <th class="text-right px-4 py-2 font-medium">損益%</th>
              </tr>
            </thead>
            <tbody id="positions-tbody">
              <tr><td colspan="5" class="text-center py-8 text-slate-500">載入中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="lg:col-span-2 bg-slate-800 rounded-xl border border-slate-700 p-5 flex flex-col">
        <p class="text-sm font-medium mb-4">資產分布</p>
        <div class="flex-1 flex items-center justify-center">
          <canvas id="alloc-chart" style="max-height:200px;"></canvas>
        </div>
        <div id="alloc-legend" class="mt-4 space-y-1.5 text-xs"></div>
      </div>
    </div>

    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
      <p class="text-sm font-medium mb-4">資產歷史走勢</p>
      <canvas id="history-chart" style="max-height:200px;"></canvas>
    </div>
  </div>

  <!-- ─── 觀察清單 ─────────────────────────────────────────────────────── -->
  <div id="panel-watchlist" class="hidden">
    <p class="text-xs text-slate-500 mb-4">
      <span class="badge-p1 text-xs px-2 py-0.5 rounded font-semibold mr-1">P1</span>高優先 —
      <span class="badge-p2 text-xs px-2 py-0.5 rounded font-semibold mx-1">P2</span>中優先 —
      <span class="badge-p3 text-xs px-2 py-0.5 rounded font-semibold mx-1">P3</span>持續追蹤
    </p>
    <div id="watchlist-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <div class="text-slate-500 text-center py-10 col-span-3">載入中…</div>
    </div>
  </div>

  <!-- ─── 市場摘要 ─────────────────────────────────────────────────────── -->
  <div id="panel-market" class="hidden">
    <div id="indices-grid" class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="text-slate-500 text-center py-10 col-span-3">載入中…</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
      <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <p class="text-sm font-medium text-green-400 mb-3">📈 強勢板塊</p>
        <div id="strong-sectors" class="space-y-2"></div>
      </div>
      <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
        <p class="text-sm font-medium text-red-400 mb-3">📉 弱勢板塊</p>
        <div id="weak-sectors" class="space-y-2"></div>
      </div>
    </div>
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5 mb-6">
      <p class="text-sm font-medium mb-3">🔔 市場重要事件</p>
      <div id="key-events" class="divide-y divide-slate-700/50"></div>
    </div>
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5">
      <p class="text-sm font-medium text-yellow-400 mb-3">⚠️ 風險提示</p>
      <div id="risk-alerts" class="divide-y divide-slate-700/50"></div>
    </div>
    <div class="bg-slate-800 rounded-xl border border-slate-700 p-5" id="ripple-section" style="display:none">
      <p class="text-sm font-medium text-cyan-400 mb-4">🌊 宏觀漣漪效應</p>
      <div id="ripple-list" class="space-y-4"></div>
    </div>
  </div>

  <!-- ─── 主題催化劑 ────────────────────────────────────────────────────── -->
  <div id="panel-themes" class="hidden">
    <div class="flex gap-5 min-h-[70vh]">

      <!-- Left: theme card grid -->
      <div class="flex-1 min-w-0">
        <div id="themes-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
          <div class="text-slate-500 text-center py-10 col-span-3">載入中…</div>
        </div>
      </div>

      <!-- Right: theme detail viewer -->
      <div class="w-[480px] shrink-0 hidden" id="theme-viewer-panel">
        <div class="bg-slate-800 rounded-xl border border-slate-700 h-full flex flex-col sticky top-20">
          <div class="px-5 py-3 border-b border-slate-700 flex items-center justify-between shrink-0">
            <span id="theme-viewer-title" class="text-sm font-medium text-slate-200"></span>
            <button onclick="closeThemeViewer()" class="text-slate-500 hover:text-slate-300 text-xs px-2 py-1 rounded hover:bg-slate-700">✕ 關閉</button>
          </div>
          <div id="theme-viewer-content" class="flex-1 overflow-y-auto px-6 py-4 prose text-sm"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── 產業研究 ─────────────────────────────────────────────────────── -->
  <div id="panel-thesis" class="hidden">
    <div class="flex gap-5 min-h-[70vh]">

      <!-- Left: category + ticker list -->
      <aside class="w-56 shrink-0 flex flex-col gap-2">
        <input id="thesis-search" type="text" placeholder="搜尋 ticker / 板塊…"
          oninput="filterThesis()"
          class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-500 w-full" />
        <div id="thesis-category-list" class="flex-1 overflow-y-auto space-y-0.5 pr-1" style="max-height:72vh;">
          <div class="text-slate-500 text-sm text-center py-10">載入中…</div>
        </div>
      </aside>

      <!-- Right: markdown viewer -->
      <div class="flex-1 min-w-0">
        <div class="bg-slate-800 rounded-xl border border-slate-700 h-full flex flex-col">
          <div class="px-6 py-3 border-b border-slate-700 flex items-center justify-between shrink-0">
            <span id="thesis-viewer-title" class="text-sm font-medium text-slate-300">← 選擇左側標的</span>
            <span id="thesis-viewer-cat"   class="text-xs text-slate-500"></span>
          </div>
          <div id="thesis-content" class="flex-1 overflow-y-auto px-7 py-5 prose text-sm">
            <div class="text-slate-500 text-center py-20">請從左側選擇產業板塊與標的</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── 報告記錄 ─────────────────────────────────────────────────────── -->
  <div id="panel-reports" class="hidden">
    <div class="flex gap-5 min-h-[70vh]">

      <!-- Left: report list -->
      <aside class="w-64 shrink-0 flex flex-col gap-2">
        <!-- Search / filter -->
        <input id="report-search" type="text" placeholder="搜尋日期 / 類型…"
          oninput="filterReports()"
          class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-200 placeholder-slate-500 outline-none focus:border-slate-500 w-full" />

        <!-- Type filter chips -->
        <div class="flex gap-1.5 flex-wrap">
          <button onclick="setTypeFilter('')"                  id="chip-all"       class="chip-btn active text-xs px-2.5 py-1 rounded-full border">全部</button>
          <button onclick="setTypeFilter('portfolio_analysis')" id="chip-portfolio" class="chip-btn text-xs px-2.5 py-1 rounded-full border">持倉</button>
          <button onclick="setTypeFilter('market_overview')"    id="chip-market"    class="chip-btn text-xs px-2.5 py-1 rounded-full border">市場</button>
        </div>

        <!-- Report list -->
        <div id="report-list" class="flex-1 overflow-y-auto space-y-0.5 pr-1" style="max-height:72vh;">
          <div class="text-slate-500 text-sm text-center py-10">載入中…</div>
        </div>
      </aside>

      <!-- Right: markdown viewer -->
      <div class="flex-1 min-w-0">
        <div id="report-viewer" class="bg-slate-800 rounded-xl border border-slate-700 h-full flex flex-col">
          <div id="report-viewer-header" class="px-6 py-3 border-b border-slate-700 flex items-center justify-between shrink-0">
            <span id="report-viewer-title" class="text-sm font-medium text-slate-300">← 選擇左側報告</span>
            <span id="report-viewer-date"  class="text-xs text-slate-500"></span>
          </div>
          <div id="report-content" class="flex-1 overflow-y-auto px-7 py-5 prose text-sm">
            <div class="text-slate-500 text-center py-20">請從左側選擇日期與報告</div>
          </div>
        </div>
      </div>

    </div>
  </div>

</main>

<!-- ── Chip button styles (cannot use @apply in CDN) ─── -->
<style>
  .chip-btn { background:#1e293b; color:#64748b; border-color:#334155; cursor:pointer; transition:all .12s; }
  .chip-btn:hover { background:#273548; color:#94a3b8; }
  .chip-btn.active { background:#1d4ed8; color:#bfdbfe; border-color:#2563eb; }
</style>

<!-- ══ Script ════════════════════════════════════════════════════════════════ -->
<script>
// ── Constants ────────────────────────────────────────────────────────────────
const ALLOC_COLORS = {
  '現金':      '#3b82f6', '長期ETF':'#22c55e', '波段個股':'#a855f7',
  '加密貨幣':  '#f97316', '合約保證金':'#6b7280',
};
const PRIORITY_CLASS = { 1:'badge-p1', 2:'badge-p2', 3:'badge-p3' };
const STATUS_CFG = {
  '未達成':  { cls:'badge-pending', icon:'⏳' },
  '部分達成': { cls:'badge-partial', icon:'🔄' },
  '已達成':  { cls:'badge-ready',   icon:'✅' },
};
const TYPE_LABEL = {
  portfolio_analysis: '持倉分析',
  market_overview:    '市場總覽',
  premarket_check:    '盤前晨檢',
};
const SESSION_LABEL = { morning:'早盤', evening:'收盤' };

let allocChart = null, histChart = null;
let allReports = [];     // full index from reports_index.json
let activeType = '';     // '' = all
let _staticTwd = { cash: 0, contract: 0 };  // non-position TWD values for live recalc

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  ['portfolio','watchlist','market','reports','themes','thesis'].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('hidden', t !== name);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === name);
  });
}

// ── Formatters ────────────────────────────────────────────────────────────────
const fmt    = (n, d=0) => n==null ? '—' : n.toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPct = n => n==null ? '—' : `${n>=0?'+':''}${n.toFixed(1)}%`;
const pnlCls = n => !n ? 'neutral' : n>0 ? 'gain' : 'loss';

// ── Summary ───────────────────────────────────────────────────────────────────
function renderSummary(d) {
  const s=d.summary, m=d.meta;
  document.getElementById('s-total').textContent = fmt(s.total_value_twd);
  const pe=document.getElementById('s-pnl'), ppe=document.getElementById('s-pnl-pct');
  pe.textContent  = (s.total_pnl_twd>=0?'+':'')+fmt(s.total_pnl_twd);
  pe.className    = `text-2xl font-bold ${pnlCls(s.total_pnl_twd)}`;
  ppe.textContent = fmtPct(s.total_pnl_pct);
  ppe.className   = `text-sm mt-0.5 ${pnlCls(s.total_pnl_twd)}`;
  document.getElementById('s-cash-pct').textContent = s.cash_pct+'%';
  document.getElementById('s-cash-twd').textContent = fmt(s.cash_twd)+' TWD';
  document.getElementById('s-usdtwd').textContent   = m.usd_twd;
  document.getElementById('meta-usd').textContent  = `USD/TWD ${m.usd_twd}`;
  document.title = `Finance Dashboard ${m.date}`;
  // Store static (non-position) TWD values for live P&L recalc
  _staticTwd.cash     = s.cash_twd || 0;
  _staticTwd.contract = Math.round(s.total_value_twd * (d.allocation?.['合約保證金'] || 0) / 100);
}

// ── Positions table ───────────────────────────────────────────────────────────
function renderPositions(d) {
  const TL={'長期ETF':'長期 ETF','個股':'波段個股','spot':'加密現貨','stablecoin':'穩定幣'};
  const TC={'長期ETF':'text-blue-400','個股':'text-purple-400','spot':'text-orange-400','stablecoin':'text-slate-500'};
  const ORDER=['長期ETF','個股','spot','stablecoin'];
  const all=[...d.positions,...d.crypto];
  let html='';

  // ── 現金 ──
  const cashTwd = d.summary?.cash_twd || 0;
  if (cashTwd > 0) {
    html+=`<tr><td colspan="5" class="px-4 py-1.5 text-xs font-semibold text-blue-400 uppercase tracking-wider bg-slate-900/60">現金</td></tr>`;
    html+=`<tr class="border-t border-slate-700/40 transition-colors">
      <td class="px-4 py-2.5"><div class="font-medium text-slate-100">現金</div><div class="text-xs text-slate-400 mt-0.5">銀行存款 / 台幣現金</div></td>
      <td class="td-price text-right px-4 py-2.5 text-xs text-slate-400">—</td>
      <td class="text-right px-4 py-2.5 text-slate-200" id="cash-value-cell">${fmt(cashTwd)}</td>
      <td class="text-right px-4 py-2.5 neutral">—</td>
      <td class="text-right px-4 py-2.5 font-semibold neutral">—</td>
    </tr>`;
  }

  // ── 持倉 ──
  ORDER.forEach(type=>{
    const g=all.filter(p=>p.type===type);
    if(!g.length) return;
    html+=`<tr><td colspan="5" class="px-4 py-1.5 text-xs font-semibold ${TC[type]||'text-slate-400'} uppercase tracking-wider bg-slate-900/60">${TL[type]||type}</td></tr>`;
    g.forEach(p=>{
      const has=p.current_value_twd!=null, pc=pnlCls(p.pnl_pct), sign=has&&p.pnl_twd>=0?'+':'';
      const qty = p.shares!=null ? p.shares : (p.quantity||0);
      const mkt = p.type==='spot'?'CRYPTO':p.type==='stablecoin'?'STABLECOIN':(p.market||'US');
      html+=`<tr class="border-t border-slate-700/40 transition-colors" data-ticker="${p.ticker}" data-qty="${qty}" data-cost-twd="${p.cost_twd||0}" data-mkt="${mkt}">
        <td class="px-4 py-2.5"><div class="font-medium text-slate-100">${p.ticker}</div><div class="text-xs text-slate-400 mt-0.5 truncate max-w-[14rem]">${p.name||''}</div></td>
        <td class="td-price text-right px-4 py-2.5 text-xs text-slate-400">${p.current_price||'—'}</td>
        <td class="td-value text-right px-4 py-2.5 text-slate-200">${has?fmt(p.current_value_twd):'—'}</td>
        <td class="td-pnl text-right px-4 py-2.5 ${pc}">${has?sign+fmt(p.pnl_twd):'—'}</td>
        <td class="td-pnlpct text-right px-4 py-2.5 font-semibold ${pc}">${has?fmtPct(p.pnl_pct):'—'}</td>
      </tr>`;
    });
  });

  // ── 合約保證金 ──
  const contractTwd = _staticTwd.contract || 0;
  if (contractTwd > 0) {
    html+=`<tr><td colspan="5" class="px-4 py-1.5 text-xs font-semibold text-slate-500 uppercase tracking-wider bg-slate-900/60">合約保證金</td></tr>`;
    html+=`<tr class="border-t border-slate-700/40 transition-colors">
      <td class="px-4 py-2.5"><div class="font-medium text-slate-100">合約保證金</div><div class="text-xs text-slate-400 mt-0.5">衍生品保證金</div></td>
      <td class="text-right px-4 py-2.5 text-xs text-slate-400">—</td>
      <td class="text-right px-4 py-2.5 text-slate-200">${fmt(contractTwd)}</td>
      <td class="text-right px-4 py-2.5 neutral">—</td>
      <td class="text-right px-4 py-2.5 font-semibold neutral">—</td>
    </tr>`;
  }

  document.getElementById('positions-tbody').innerHTML = html||'<tr><td colspan="5" class="text-center py-8 text-slate-500">無持倉資料</td></tr>';
}

function setTypeFilter(type) {
  activeType = type;
  ['all','portfolio','market'].forEach(k=>{

    document.getElementById(`chip-${k}`).classList.toggle('active', map[k]===type);
  });

function filterReports() { renderReportList(); }

function renderReportList() {
  const q   = document.getElementById('report-search').value.trim().toLowerCase();
  const list= document.getElementById('report-list');

  const filtered = allReports.filter(r => {
    const matchType = !activeType || r.type === activeType;
    const matchQ    = !q || r.label.toLowerCase().includes(q) || r.date.includes(q);
    return matchType && matchQ;
  });

  if (!filtered.length) {
    list.innerHTML='<div class="text-slate-500 text-sm text-center py-6">無符合的報告</div>';
    return;
  }

  // Group by date
  const byDate = {};
  filtered.forEach(r => { (byDate[r.date] = byDate[r.date]||[]).push(r); });

  list.innerHTML = Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).map(date => {
    const items = byDate[date];
    const itemsHtml = items.map(r => {
      const sessLabel = SESSION_LABEL[r.session] || '';
      const typeLabel = TYPE_LABEL[r.type]       || r.type;
      return `<div class="report-item px-3 py-1.5 rounded text-xs text-slate-400 hover:text-slate-200"
                   onclick="loadReport('${r.filename}','${r.label}','${r.date}')">
                <span class="text-slate-500 mr-1">${sessLabel}</span>${typeLabel}
              </div>`;
    }).join('');
    return `<div class="mb-1">
      <div class="text-xs text-slate-500 px-3 py-1 font-semibold">${date}</div>
      ${itemsHtml}
    </div>`;
  }).join('');
}

async function loadReport(filename, label, date) {
  // Highlight selected
  document.querySelectorAll('.report-item').forEach(el => {
    el.classList.toggle('selected', el.onclick?.toString().includes(filename));
  });

  document.getElementById('report-viewer-title').textContent = label;
  document.getElementById('report-viewer-date').textContent  = date;
  document.getElementById('report-content').innerHTML =
    '<div class="text-slate-500 text-center py-10">載入中…</div>';

  try {
    const res  = await fetch(`reports/${filename}?t=${Date.now()}`);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    document.getElementById('report-content').innerHTML =
      `<div class="prose">${marked.parse(text)}</div>`;
  } catch(e) {
    document.getElementById('report-content').innerHTML =
      `<div class="text-red-400 py-10 text-center text-sm">無法載入報告：${e.message}</div>`;
  }
}

function renderReportsTab(index) {

async function openThemeViewer(filename, name) {
  const panel = document.getElementById('theme-viewer-panel');
  panel.classList.remove('hidden');
  document.getElementById('theme-viewer-title').textContent = name;
  document.getElementById('theme-viewer-content').innerHTML =
    '<div class="text-slate-500 text-center py-10">載入中…</div>';
  try {
    const r = await fetch(`themes/${filename}?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status);
    let text = await r.text();
    // Strip YAML front matter before rendering
    if (text.startsWith('---')) {
      const end = text.indexOf('\n---', 3);
      if (end !== -1) text = text.slice(end + 4).trim();
    }
    document.getElementById('theme-viewer-content').innerHTML =
      `<div class="prose">${marked.parse(text)}</div>`;
  } catch(e) {
    document.getElementById('theme-viewer-content').innerHTML =
      `<div class="text-red-400 py-10 text-center text-sm">無法載入：${e.message}</div>`;
  }
}

// ── LivePrices ────────────────────────────────────────────────────────────────
const LivePrices = (() => {
  // Tickers to refresh (must match portfolio.json)
  const US_TICKERS = ['VTI','VT','VGIT','MRVL','CRWD','ALAB','NET'];
  const TW_TICKERS = ['006208','00719B','00859B','3030'];
  const CRYPTO_MAP = { BTC:'bitcoin', ETH:'ethereum', XRP:'ripple' };

  let liveData   = {};   // ticker → live price in native currency
  let liveUsdTwd = null;
  let anySuccess = false;

  const showBadge = on => {
    const e = document.getElementById('live-badge');
    if (e) e.classList.toggle('hidden', !on);
  };

  async function fetchFX() {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    if (j.rates?.TWD) {
      liveUsdTwd = j.rates.TWD;
      anySuccess = true;
      document.getElementById('s-usdtwd').textContent = liveUsdTwd.toFixed(2);
      document.getElementById('meta-usd').textContent = `USD/TWD ${liveUsdTwd.toFixed(2)} · 即時`;
    }
  }

  async function fetchCrypto() {
    const ids = Object.values(CRYPTO_MAP).join(',');
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
    const j = await r.json();
    Object.entries(CRYPTO_MAP).forEach(([tk, id]) => {
      if (j[id]?.usd) { liveData[tk] = j[id].usd; anySuccess = true; }
    });
  }

  async function fetchUS() {
    // 主要：Yahoo Finance chart API（免費、無需 key）透過 corsproxy
    try {
      await Promise.all(US_TICKERS.map(async tk => {
        const yfUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${tk}?range=1d&interval=1d`;
        const url   = `https://corsproxy.io/?${encodeURIComponent(yfUrl)}`;
        const r = await fetch(url);
        const j = await r.json();
        const price = j.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (price > 0) { liveData[tk] = price; anySuccess = true; }
      }));
    } catch {}
    // 補充：若有 Finnhub key，以更即時的報價覆蓋
    const key = window.FINNHUB_KEY;
    if (!key) return;
    await Promise.all(US_TICKERS.map(async tk => {
      try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${tk}&token=${key}`);
        const j = await r.json();
        if (j.c > 0) { liveData[tk] = j.c; anySuccess = true; }
      } catch {}
    }));
  }

  async function fetchTW() {
    const codes = TW_TICKERS.map(t => `tse_${t}.tw`).join('|');
    const twseUrl = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(codes)}&json=1&delay=0`;
    // On localhost fetch directly; elsewhere use CORS proxy
    const url = ['localhost', '127.0.0.1'].includes(location.hostname)
      ? twseUrl
      : `https://corsproxy.io/?${encodeURIComponent(twseUrl)}`;
    const r = await fetch(url);
    const j = await r.json();
    j.msgArray?.forEach(item => {
      // item.z = 即時成交價（非交易時段為 "-"），fallback 到 item.y（昨收）
      const price = parseFloat(item.z !== '-' ? item.z : item.y);
      if (item.c && price > 0) { liveData[item.c] = price; anySuccess = true; }
    });
  }

  function applyLivePrices() {
    if (!anySuccess) return;
    showBadge(true);

    const usdTwd = liveUsdTwd
      || parseFloat((document.getElementById('s-usdtwd').textContent || '').replace(/[^\d.]/g, ''))
      || 32;

    document.querySelectorAll('#positions-tbody tr[data-ticker]').forEach(row => {
      const tk      = row.dataset.ticker;
      const price   = liveData[tk];
      if (!price) return;
      const qty     = parseFloat(row.dataset.qty    || 0);
      const costTwd = parseFloat(row.dataset.costTwd || 0);
      const mkt     = row.dataset.mkt;
      if (!qty) return;

      let currentValueTwd, displayPrice;
      if (mkt === 'STABLECOIN') {
        currentValueTwd = qty * usdTwd;
        displayPrice    = '1.00';
      } else if (mkt === 'TW') {
        currentValueTwd = qty * price;
        displayPrice    = price.toFixed(2);
      } else { // US / CRYPTO
        currentValueTwd = qty * price * usdTwd;
        displayPrice    = price < 10 ? price.toFixed(4) : price.toFixed(2);
      }

      const pnl    = currentValueTwd - costTwd;
      const pnlPct = costTwd > 0 ? pnl / costTwd * 100 : 0;
      const cls    = pnl >= 0 ? 'gain' : 'loss';

      row.querySelector('.td-price').textContent = displayPrice;
      row.querySelector('.td-value').textContent = fmt(currentValueTwd);
      const pEl = row.querySelector('.td-pnl');
      pEl.textContent = (pnl >= 0 ? '+' : '') + fmt(pnl);
      pEl.className   = `td-pnl text-right px-4 py-2.5 ${cls}`;
      const pPctEl = row.querySelector('.td-pnlpct');
      pPctEl.textContent = `${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(1)}%`;
      pPctEl.className   = `td-pnlpct text-right px-4 py-2.5 font-semibold ${cls}`;
    });

    // ── Recalculate Summary Cards ─────────────────────────────────────────
    let livePositionsTotal = 0;
    let liveCostTotal      = 0;
    document.querySelectorAll('#positions-tbody tr[data-ticker]').forEach(row => {
      const costTwd = parseFloat(row.dataset.costTwd || 0);
      liveCostTotal += costTwd;
      // Use live-updated value if available, else fall back to snapshot cost
      const valEl  = row.querySelector('.td-value');
      const valStr = valEl?.textContent?.replace(/,/g, '') || '';
      livePositionsTotal += (valStr && valStr !== '—') ? (parseFloat(valStr) || costTwd) : costTwd;
    });

    const newTotal   = livePositionsTotal + _staticTwd.cash + _staticTwd.contract;
    const newPnl     = livePositionsTotal - liveCostTotal;
    const newPnlPct  = liveCostTotal > 0 ? newPnl / liveCostTotal * 100 : 0;
    const newCashPct = newTotal > 0 ? _staticTwd.cash / newTotal * 100 : 0;

    document.getElementById('s-total').textContent = fmt(newTotal);
    const sEl = document.getElementById('s-pnl');
    sEl.textContent = (newPnl >= 0 ? '+' : '') + fmt(newPnl);
    sEl.className   = `text-2xl font-bold ${pnlCls(newPnl)}`;
    const sPctEl = document.getElementById('s-pnl-pct');
    sPctEl.textContent = fmtPct(newPnlPct);
    sPctEl.className   = `text-sm mt-0.5 ${pnlCls(newPnl)}`;
    document.getElementById('s-cash-pct').textContent = newCashPct.toFixed(1) + '%';
  }

  async function refresh() {
    const results = await Promise.allSettled([fetchFX(), fetchCrypto(), fetchUS(), fetchTW()]);
    applyLivePrices();
    if (anySuccess) {
      const t = new Date().toLocaleTimeString('zh-TW', {
        timeZone: 'Asia/Taipei', hour12: false,
        hour: '2-digit', minute: '2-digit',
      });
      const el = document.getElementById('live-last-updated');
      if (el) { el.textContent = `更新 ${t}`; el.classList.remove('hidden'); }
    }
    results.filter(r => r.status === 'rejected')
           .forEach(r => console.warn('LivePrices:', r.reason?.message || r.reason));
  }

  function start() {
    refresh();
    setInterval(refresh, 15_000);
  }

  return { start, refresh };
})();

loadDashboard();

// ── Live clock (every second, Asia/Taipei) ────────────────────────────────────
(function startClock() {
  const el = document.getElementById('live-clock');
  const tick = () => {
    if (el) el.textContent = new Date().toLocaleTimeString('zh-TW', {
      timeZone: 'Asia/Taipei', hour12: false,
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  };
  tick();
  setInterval(tick, 1000);
})();
</script>
